<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM Manager 2026</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f7;
  text-align: center;
  margin: 0;
}

h1 {
  background: #d00000;
  color: white;
  padding: 15px;
  margin: 0;
}

.subtitle {
  margin: 10px 0 20px;
  color: #333;
}

.topbar {
  background: white;
  margin: 16px auto;
  padding: 12px;
  width: min(950px, calc(100% - 24px));
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.topbar select,
.topbar button {
  margin: 4px;
}

.match {
  background: white;
  margin: 12px auto;
  padding: 18px;
  width: min(920px, calc(100% - 24px));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-height: 70px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  flex-wrap: wrap;
}

.teamSide {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 260px;
  justify-content: center;
}

.teamSide select {
  padding: 8px;
  font-size: 14px;
  min-width: 180px;
}

.flag {
  width: 45px;
  height: 32px;
  object-fit: cover;
  border-radius: 4px;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.12);
  background: #eee;
  flex-shrink: 0;
}

.match input {
  width: 55px;
  text-align: center;
  font-size: 16px;
  padding: 8px;
}

button {
  padding: 7px 12px;
  border: none;
  background: #0077cc;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #005fa3;
}

button.danger {
  background: #b00020;
}

button.danger:hover {
  background: #820018;
}

table {
  margin: 20px auto;
  border-collapse: collapse;
  width: min(850px, calc(100% - 24px));
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #333;
  color: white;
}

td img {
  width: 28px;
  height: 20px;
  object-fit: cover;
  vertical-align: middle;
  margin-right: 6px;
  border-radius: 3px;
}

.groupGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 16px;
  width: min(1200px, calc(100% - 24px));
  margin: 20px auto;
}

.groupCard {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.groupCard table {
  width: 100%;
  margin: 8px 0 0;
  box-shadow: none;
}

.koGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  width: min(1300px, calc(100% - 24px));
  margin: 20px auto;
}

.koRound {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.koMatch {
  background: #f7f9fc;
  border: 1px solid #ddd;
  border-radius: 9px;
  padding: 10px;
  margin: 10px 0;
  font-size: 14px;
}

.koTeams {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 6px;
}

.koTeams input {
  width: 40px;
  text-align: center;
  padding: 5px;
}

.small {
  color: #666;
  font-size: 13px;
}

.notice {
  background: #fff5d6;
  border: 1px solid #f0d47a;
  padding: 10px;
  border-radius: 10px;
  width: min(850px, calc(100% - 24px));
  margin: 12px auto;
}

@media(max-width: 700px) {
  .teamSide {
    min-width: 100%;
  }
  .match {
    padding: 12px;
  }
  .flag {
    width: 38px;
    height: 27px;
  }
}
</style>
</head>

<body>

<h1>🏆 WM Manager 2026</h1>
<div class="subtitle">Mit Länderauswahl, Flaggen, Gruppenphase und K.-o.-Runde</div>

<div class="topbar">
  <label>Ansicht:</label>
  <select id="view" onchange="changeView()">
    <option value="matches">Gruppenspiele</option>
    <option value="tables">Tabellen</option>
    <option value="ko">K.-o.-Phase</option>
  </select>

  <label id="groupLabel">Gruppe:</label>
  <select id="groupSelect" onchange="render()"></select>

  <button onclick="resetAll()" class="danger">Alles zurücksetzen</button>
</div>

<div id="content"></div>

<script>
const fallbackLogo = "https://upload.wikimedia.org/wikipedia/commons/8/84/No_Image_Available.jpg";

const teams = {
  "MEX": {name:"Mexiko", flag:"https://flagcdn.com/w80/mx.png"},
  "RSA": {name:"Südafrika", flag:"https://flagcdn.com/w80/za.png"},
  "KOR": {name:"Südkorea", flag:"https://flagcdn.com/w80/kr.png"},
  "CZE": {name:"Tschechien", flag:"https://flagcdn.com/w80/cz.png"},
  "CAN": {name:"Kanada", flag:"https://flagcdn.com/w80/ca.png"},
  "BIH": {name:"Bosnien-Herzegowina", flag:"https://flagcdn.com/w80/ba.png"},
  "QAT": {name:"Katar", flag:"https://flagcdn.com/w80/qa.png"},
  "SUI": {name:"Schweiz", flag:"https://flagcdn.com/w80/ch.png"},
  "BRA": {name:"Brasilien", flag:"https://flagcdn.com/w80/br.png"},
  "MAR": {name:"Marokko", flag:"https://flagcdn.com/w80/ma.png"},
  "HTI": {name:"Haiti", flag:"https://flagcdn.com/w80/ht.png"},
  "SCO": {name:"Schottland", flag:"https://flagcdn.com/w80/gb-sct.png"},
  "USA": {name:"USA", flag:"https://flagcdn.com/w80/us.png"},
  "PAR": {name:"Paraguay", flag:"https://flagcdn.com/w80/py.png"},
  "AUS": {name:"Australien", flag:"https://flagcdn.com/w80/au.png"},
  "TUR": {name:"Türkei", flag:"https://flagcdn.com/w80/tr.png"},
  "GER": {name:"Deutschland", flag:"https://flagcdn.com/w80/de.png"},
  "CUW": {name:"Curaçao", flag:"https://flagcdn.com/w80/cw.png"},
  "CIV": {name:"Elfenbeinküste", flag:"https://flagcdn.com/w80/ci.png"},
  "ECU": {name:"Ecuador", flag:"https://flagcdn.com/w80/ec.png"},
  "NED": {name:"Niederlande", flag:"https://flagcdn.com/w80/nl.png"},
  "JPN": {name:"Japan", flag:"https://flagcdn.com/w80/jp.png"},
  "SWE": {name:"Schweden", flag:"https://flagcdn.com/w80/se.png"},
  "TUN": {name:"Tunesien", flag:"https://flagcdn.com/w80/tn.png"},
  "BEL": {name:"Belgien", flag:"https://flagcdn.com/w80/be.png"},
  "EGY": {name:"Ägypten", flag:"https://flagcdn.com/w80/eg.png"},
  "IRI": {name:"Iran", flag:"https://flagcdn.com/w80/ir.png"},
  "NZL": {name:"Neuseeland", flag:"https://flagcdn.com/w80/nz.png"},
  "ESP": {name:"Spanien", flag:"https://flagcdn.com/w80/es.png"},
  "CPV": {name:"Kap Verde", flag:"https://flagcdn.com/w80/cv.png"},
  "KSA": {name:"Saudi-Arabien", flag:"https://flagcdn.com/w80/sa.png"},
  "URU": {name:"Uruguay", flag:"https://flagcdn.com/w80/uy.png"},
  "FRA": {name:"Frankreich", flag:"https://flagcdn.com/w80/fr.png"},
  "SEN": {name:"Senegal", flag:"https://flagcdn.com/w80/sn.png"},
  "IRQ": {name:"Irak", flag:"https://flagcdn.com/w80/iq.png"},
  "NOR": {name:"Norwegen", flag:"https://flagcdn.com/w80/no.png"},
  "ARG": {name:"Argentinien", flag:"https://flagcdn.com/w80/ar.png"},
  "DZA": {name:"Algerien", flag:"https://flagcdn.com/w80/dz.png"},
  "AUT": {name:"Österreich", flag:"https://flagcdn.com/w80/at.png"},
  "JOR": {name:"Jordanien", flag:"https://flagcdn.com/w80/jo.png"},
  "POR": {name:"Portugal", flag:"https://flagcdn.com/w80/pt.png"},
  "COD": {name:"DR Kongo", flag:"https://flagcdn.com/w80/cd.png"},
  "UZB": {name:"Usbekistan", flag:"https://flagcdn.com/w80/uz.png"},
  "COL": {name:"Kolumbien", flag:"https://flagcdn.com/w80/co.png"},
  "ENG": {name:"England", flag:"https://flagcdn.com/w80/gb-eng.png"},
  "CRO": {name:"Kroatien", flag:"https://flagcdn.com/w80/hr.png"},
  "GHA": {name:"Ghana", flag:"https://flagcdn.com/w80/gh.png"},
  "PAN": {name:"Panama", flag:"https://flagcdn.com/w80/pa.png"}
};

const groups = {
  A:["MEX","RSA","KOR","CZE"],
  B:["CAN","BIH","QAT","SUI"],
  C:["BRA","MAR","HTI","SCO"],
  D:["USA","PAR","AUS","TUR"],
  E:["GER","CUW","CIV","ECU"],
  F:["NED","JPN","SWE","TUN"],
  G:["BEL","EGY","IRI","NZL"],
  H:["ESP","CPV","KSA","URU"],
  I:["FRA","SEN","IRQ","NOR"],
  J:["ARG","DZA","AUT","JOR"],
  K:["POR","COD","UZB","COL"],
  L:["ENG","CRO","GHA","PAN"]
};

const defaultMatches = [];
Object.entries(groups).forEach(([group, arr]) => {
  defaultMatches.push({id:group+"-1", group, team1:arr[0], team2:arr[1], t1:"", t2:""});
  defaultMatches.push({id:group+"-2", group, team1:arr[2], team2:arr[3], t1:"", t2:""});
  defaultMatches.push({id:group+"-3", group, team1:arr[0], team2:arr[2], t1:"", t2:""});
  defaultMatches.push({id:group+"-4", group, team1:arr[3], team2:arr[1], t1:"", t2:""});
  defaultMatches.push({id:group+"-5", group, team1:arr[3], team2:arr[0], t1:"", t2:""});
  defaultMatches.push({id:group+"-6", group, team1:arr[1], team2:arr[2], t1:"", t2:""});
});

const koRounds = [
  {key:"R32", name:"Sechzehntelfinale", count:16},
  {key:"R16", name:"Achtelfinale", count:8},
  {key:"QF", name:"Viertelfinale", count:4},
  {key:"SF", name:"Halbfinale", count:2},
  {key:"P3", name:"Spiel um Platz 3", count:1},
  {key:"F", name:"Finale", count:1}
];

function allTeamOptions(selected){
  return Object.entries(teams)
    .sort((a,b)=>a[1].name.localeCompare(b[1].name))
    .map(([code,t])=>`<option value="${code}" ${code===selected ? "selected" : ""}>${t.name}</option>`)
    .join("");
}

function img(code){
  if(!code || !teams[code]) return "";
  return `<img src="${teams[code].flag}" class="flag" onerror="this.src='${fallbackLogo}'">`;
}

function imgSmall(code){
  if(!code || !teams[code]) return "";
  return `<img src="${teams[code].flag}" onerror="this.src='${fallbackLogo}'">`;
}

function teamLabel(code){
  if(!code) return "offen";
  if(!teams[code]) return code;
  return `${imgSmall(code)} ${teams[code].name}`;
}

function loadData(){
  return JSON.parse(localStorage.getItem("wmManager2026") || "{}");
}

function saveData(data){
  localStorage.setItem("wmManager2026", JSON.stringify(data));
}

function getMatches(){
  const data = loadData();
  if(!data.matches) {
    data.matches = defaultMatches;
    saveData(data);
  }
  return data.matches;
}

function getKo(){
  const data = loadData();
  if(!data.ko) {
    data.ko = {};
    koRounds.forEach(r=>{
      data.ko[r.key] = [];
      for(let i=0;i<r.count;i++){
        data.ko[r.key].push({t1:"", t2:"", team1:"", team2:""});
      }
    });
    saveData(data);
  }
  return data.ko;
}

function saveMatch(id, field, value){
  const data = loadData();
  data.matches = data.matches || defaultMatches;
  const m = data.matches.find(x=>x.id===id);
  if(m) m[field] = value;
  saveData(data);
  render();
}

function saveKo(round, index, field, value){
  const data = loadData();
  data.ko = getKo();
  data.ko[round][index][field] = value;
  saveData(data);
}

function saveKoTeam(round, index, side, value){
  const data = loadData();
  data.ko = getKo();
  data.ko[round][index][side] = value;
  saveData(data);
  renderKo();
}

function initSelectors(){
  const groupSelect = document.getElementById("groupSelect");
  groupSelect.innerHTML = Object.keys(groups).map(g=>`<option value="${g}">Gruppe ${g}</option>`).join("");
}

function changeView(){
  const view = document.getElementById("view").value;
  document.getElementById("groupSelect").style.display = view==="matches" ? "inline-block" : "none";
  document.getElementById("groupLabel").style.display = view==="matches" ? "inline-block" : "none";
  render();
}

function render(){
  const view = document.getElementById("view").value;
  if(view === "matches") renderMatches();
  if(view === "tables") renderAllTables();
  if(view === "ko") renderKo();
}

function renderMatches(){
  const group = document.getElementById("groupSelect").value;
  const matches = getMatches().filter(m=>m.group===group);
  let html = `<h2>⚽ Gruppenspiele Gruppe ${group}</h2>`;

  matches.forEach(m=>{
    html += `
    <div class="match">
      <div class="teamSide">
        ${img(m.team1)}
        <select onchange="saveMatch('${m.id}','team1',this.value)">${allTeamOptions(m.team1)}</select>
      </div>

      <input type="number" value="${m.t1}" onchange="saveMatch('${m.id}','t1',this.value)">
      <span style="font-size:18px;">:</span>
      <input type="number" value="${m.t2}" onchange="saveMatch('${m.id}','t2',this.value)">

      <div class="teamSide">
        <select onchange="saveMatch('${m.id}','team2',this.value)">${allTeamOptions(m.team2)}</select>
        ${img(m.team2)}
      </div>
    </div>`;
  });

  html += `<h2>📊 Tabelle Gruppe ${group}</h2>`;
  html += renderTable(group);
  document.getElementById("content").innerHTML = html;
}

function calcTable(group){
  const table = {};
  groups[group].forEach(code=>{
    table[code] = {team:code, points:0, gf:0, ga:0, gd:0, played:0, wins:0, draws:0, losses:0};
  });

  getMatches().filter(m=>m.group===group).forEach(m=>{
    [m.team1, m.team2].forEach(code => {
      if(code && !table[code]) table[code] = {team:code, points:0, gf:0, ga:0, gd:0, played:0, wins:0, draws:0, losses:0};
    });

    if(m.t1==="" || m.t2==="") return;

    const a = parseInt(m.t1);
    const b = parseInt(m.t2);
    if(Number.isNaN(a) || Number.isNaN(b)) return;

    const home = table[m.team1];
    const away = table[m.team2];

    home.played++; away.played++;
    home.gf += a; home.ga += b;
    away.gf += b; away.ga += a;

    if(a>b){ home.points+=3; home.wins++; away.losses++; }
    else if(b>a){ away.points+=3; away.wins++; home.losses++; }
    else { home.points++; away.points++; home.draws++; away.draws++; }
  });

  Object.values(table).forEach(t=>t.gd = t.gf - t.ga);

  return Object.values(table).sort((a,b)=>
    b.points-a.points ||
    b.gd-a.gd ||
    b.gf-a.gf ||
    teams[a.team].name.localeCompare(teams[b.team].name)
  );
}

function renderTable(group){
  const sorted = calcTable(group);
  let html = `<table><thead><tr>
    <th>Platz</th><th>Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Diff</th><th>Punkte</th>
  </tr></thead><tbody>`;

  sorted.forEach((t,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${teamLabel(t.team)}</td>
      <td>${t.played}</td>
      <td>${t.wins}</td>
      <td>${t.draws}</td>
      <td>${t.losses}</td>
      <td>${t.gf}:${t.ga}</td>
      <td>${t.gd}</td>
      <td><b>${t.points}</b></td>
    </tr>`;
  });

  html += "</tbody></table>";
  return html;
}

function renderAllTables(){
  let html = `<h2>📊 Alle Gruppentabellen</h2><div class="groupGrid">`;
  Object.keys(groups).forEach(g=>{
    html += `<div class="groupCard"><h3>Gruppe ${g}</h3>${renderTable(g)}</div>`;
  });
  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function qualifiers(){
  const first = [];
  const second = [];
  const thirds = [];

  Object.keys(groups).forEach(g=>{
    const t = calcTable(g);
    if(t[0]) first.push(t[0].team);
    if(t[1]) second.push(t[1].team);
    if(t[2]) thirds.push({...t[2], group:g});
  });

  thirds.sort((a,b)=>
    b.points-a.points ||
    b.gd-a.gd ||
    b.gf-a.gf ||
    teams[a.team].name.localeCompare(teams[b.team].name)
  );

  return [...first, ...second, ...thirds.slice(0,8).map(x=>x.team)];
}

function autoFillKo(){
  const q = qualifiers();
  const data = loadData();
  data.ko = getKo();

  for(let i=0;i<16;i++){
    data.ko.R32[i].team1 = q[i] || "";
    data.ko.R32[i].team2 = q[31-i] || "";
  }

  saveData(data);
  renderKo();
}

function winner(m){
  const a = parseInt(m.t1);
  const b = parseInt(m.t2);
  if(Number.isNaN(a) || Number.isNaN(b) || !m.team1 || !m.team2 || a===b) return "";
  return a>b ? m.team1 : m.team2;
}

function loser(m){
  const a = parseInt(m.t1);
  const b = parseInt(m.t2);
  if(Number.isNaN(a) || Number.isNaN(b) || !m.team1 || !m.team2 || a===b) return "";
  return a>b ? m.team2 : m.team1;
}

function fillNextRounds(){
  const data = loadData();
  data.ko = getKo();
  const pairs = [
    ["R32","R16"],
    ["R16","QF"],
    ["QF","SF"],
    ["SF","F"]
  ];

  pairs.forEach(([from,to])=>{
    for(let i=0;i<data.ko[to].length;i++){
      const w1 = winner(data.ko[from][i*2]);
      const w2 = winner(data.ko[from][i*2+1]);
      if(w1) data.ko[to][i].team1 = w1;
      if(w2) data.ko[to][i].team2 = w2;
    }
  });

  data.ko.P3[0].team1 = loser(data.ko.SF[0]) || data.ko.P3[0].team1;
  data.ko.P3[0].team2 = loser(data.ko.SF[1]) || data.ko.P3[0].team2;

  saveData(data);
  renderKo();
}

function koTeamSelect(round, index, side, selected){
  return `<select onchange="saveKoTeam('${round}',${index},'${side}',this.value)">
    <option value="">offen</option>
    ${allTeamOptions(selected)}
  </select>`;
}

function renderKo(){
  const ko = getKo();
  let html = `
    <h2>🏆 K.-o.-Phase</h2>
    <div class="notice">
      Jetzt kannst du auch in der K.-o.-Phase die Länder manuell auswählen.
      Optional kannst du den KO-Baum aus den Gruppentabellen befüllen lassen.
    </div>
    <button onclick="autoFillKo()">KO aus Tabellen befüllen</button>
    <button onclick="fillNextRounds()">Sieger weiter übernehmen</button>
    <div class="koGrid">
  `;

  koRounds.forEach(round=>{
    html += `<div class="koRound"><h3>${round.name}</h3>`;
    ko[round.key].forEach((m,i)=>{
      html += `<div class="koMatch">
        <div class="small">Spiel ${i+1}</div>
        <div class="koTeams">
          <div>${img(m.team1)}<br>${koTeamSelect(round.key,i,"team1",m.team1)}</div>
          <div>
            <input type="number" value="${m.t1}" onchange="saveKo('${round.key}',${i},'t1',this.value)">
            :
            <input type="number" value="${m.t2}" onchange="saveKo('${round.key}',${i},'t2',this.value)">
          </div>
          <div>${img(m.team2)}<br>${koTeamSelect(round.key,i,"team2",m.team2)}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function resetAll(){
  if(confirm("Wirklich alle Ergebnisse und Änderungen löschen?")){
    localStorage.removeItem("wmManager2026");
    render();
  }
}

initSelectors();
changeView();
</script>

</body>
</html>
